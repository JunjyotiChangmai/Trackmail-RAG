name: CI/CD Pipeline for Trackmail RAG

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |

            # Go to project folder
            cd /home/ubuntu/Trackmail-RAG

            # Pull latest code
            git pull origin main

            # Build & restart containers (backend + worker + redis)
            docker compose up -d --build